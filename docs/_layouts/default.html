<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en-US' }}">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>

    <link rel="stylesheet" href="{{ '/assets/css/style.css?v=' | append: site.github.build_revision | relative_url }}">
  </head>

  <body class="deck page-{{ page.title | slugify }}">
    {% assign readme_url = site.readme_url | default: site.repository_url | default: site.github.repository_url %}

    <header class="page-header" role="banner">
      <div class="page-header__inner">
        <div class="page-header__brand">
          <a class="site-title" href="{{ '/' | relative_url }}">{{ site.title }}</a>
          <div class="site-tagline">Slides on the site · handout in the README</div>
        </div>
        {% if readme_url %}
          <a class="site-link" href="{{ readme_url }}">Handout / README</a>
        {% endif %}
      </div>
    </header>

    <main id="content" class="main-content" role="main">
      {% include deck_nav.html %}

      <section class="slide" aria-label="Slide content">
        {{ content }}
      </section>
    </main>
  </body>
</html>
